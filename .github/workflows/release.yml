name: Build Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      suffix:
        description: "版本后缀（如 v1.0.0），留空则不带后缀"
        required: false
        default: ""

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync
          uv run python -m pip install pyinstaller

      - name: Determine version suffix
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "suffix=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            SUFFIX="${{ inputs.suffix }}"
            if [ -z "$SUFFIX" ]; then
              echo "suffix=" >> "$GITHUB_OUTPUT"
            else
              echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build binaries
        shell: bash
        run: |
          if [ -n "${{ steps.version.outputs.suffix }}" ]; then
            uv run python build_installer.py --all --suffix "${{ steps.version.outputs.suffix }}"
          else
            uv run python build_installer.py --all
          fi

      - name: Create Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Upload artifacts (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: sct-windows
          path: dist/*
